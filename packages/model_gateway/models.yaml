# Citnega Model Configuration
# ---------------------------
# providers: defines how to connect to each backend
# models:    maps model IDs to providers and parameters
#
# Environment variable syntax: ${VAR_NAME} or ${VAR_NAME:-default}
#
# Provider types:
#   ollama            — local Ollama server
#   openai_compatible — any OpenAI-compatible HTTP API (LM Studio, vLLM, etc.)
#   litellm           — universal cloud adapter (OpenAI, Anthropic, Azure, Gemini,
#                       Groq, Bedrock, Cohere, Mistral, and 100+ others via litellm)
#
# Auth modes (litellm providers only):
#   api_key               — plain API key (default)
#   google_service_account — Google SA JSON → OAuth2 access token
#   azure_certificate      — PEM cert + Azure AD client_credentials flow
#   jwt_bearer             — self-signed JWT used directly as Bearer token

providers:
  # ── Local Ollama ──────────────────────────────────────────────────────────
  ollama_local:
    type: ollama
    base_url: "${OLLAMA_BASE_URL:-http://localhost:11434}"

  # ── LM Studio (local OpenAI-compatible) ──────────────────────────────────
  lm_studio:
    type: openai_compatible
    base_url: "${LM_STUDIO_BASE_URL:-http://localhost:1234/v1}"
    api_key: "lm-studio"

  # ── Custom remote (self-hosted vLLM, Llama.cpp server, etc.) ─────────────
  custom_remote:
    type: openai_compatible
    base_url: "${CUSTOM_REMOTE_URL:-http://localhost:8000/v1}"
    api_key: "${CUSTOM_REMOTE_API_KEY:-}"

  # ── OpenAI (via litellm) ──────────────────────────────────────────────────
  openai_cloud:
    type: litellm
    api_key: "${OPENAI_API_KEY:-}"

  # ── Anthropic (via litellm) ───────────────────────────────────────────────
  anthropic_cloud:
    type: litellm
    api_key: "${ANTHROPIC_API_KEY:-}"

  # ── Google Gemini — API key auth (via litellm) ────────────────────────────
  gemini_cloud:
    type: litellm
    api_key: "${GEMINI_API_KEY:-}"

  # ── Google Gemini — service account auth (no API key needed) ─────────────
  # Uncomment and set GOOGLE_APPLICATION_CREDENTIALS to your SA JSON path.
  # gemini_sa:
  #   type: litellm
  #   auth_mode: google_service_account
  #   pem_file: "${GOOGLE_APPLICATION_CREDENTIALS:-}"

  # ── Azure OpenAI — API key auth ───────────────────────────────────────────
  azure_openai:
    type: litellm
    api_key: "${AZURE_OPENAI_API_KEY:-}"
    extra:
      api_version: "${AZURE_OPENAI_API_VERSION:-2024-02-01}"

  # ── Azure OpenAI — certificate auth (no API key needed) ──────────────────
  # Uncomment and fill in your tenant/client/cert details.
  # azure_cert:
  #   type: litellm
  #   auth_mode: azure_certificate
  #   pem_file: "${AZURE_PEM_FILE:-}"
  #   extra:
  #     tenant_id: "${AZURE_TENANT_ID:-}"
  #     client_id: "${AZURE_CLIENT_ID:-}"
  #     scope: "https://cognitiveservices.azure.com/.default"
  #     api_version: "2024-02-01"

  # ── Groq (ultra-fast inference, via litellm) ──────────────────────────────
  groq_cloud:
    type: litellm
    api_key: "${GROQ_API_KEY:-}"

  # ── Mistral (via litellm) ─────────────────────────────────────────────────
  mistral_cloud:
    type: litellm
    api_key: "${MISTRAL_API_KEY:-}"

  # ── Cohere (via litellm) ──────────────────────────────────────────────────
  cohere_cloud:
    type: litellm
    api_key: "${COHERE_API_KEY:-}"

  # ── AWS Bedrock (via litellm — uses boto3 / env credentials) ─────────────
  # bedrock:
  #   type: litellm
  #   extra:
  #     aws_region_name: "${AWS_DEFAULT_REGION:-us-east-1}"


models:
  # ── Local Ollama models (sorted by priority — highest = preferred) ────────
