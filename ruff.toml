target-version = "py311"
line-length    = 100

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "ARG", # flake8-unused-arguments
    "SIM", # flake8-simplify
    "TCH", # flake8-type-checking
    "RUF", # ruff-specific
]
ignore = [
    "E501",   # line-too-long (handled by formatter)
    "B008",   # function-call-in-default-argument (used in Typer)
    "B024",   # abstract-base-class-without-abstract-method (intentional base classes)
    "SIM108", # ternary-instead-of-if (readability preference)
]

[lint.per-file-ignores]
"tests/*"          = ["ARG", "S101"]
"packages/bootstrap/bootstrap.py" = ["F401"]  # composition root: many imports

[lint.isort]
known-first-party = ["citnega"]
force-sort-within-sections = true

[format]
quote-style             = "double"
indent-style            = "space"
skip-magic-trailing-comma = false
