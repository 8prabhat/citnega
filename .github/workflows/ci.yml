name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:             [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        # Only install dev extras — optional framework SDKs (adk, langgraph, crewai)
        # are not required; adapter tests skip gracefully when SDKs are absent.
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check packages/ apps/ tests/

      - name: Format check (ruff)
        run: uv run ruff format --check packages/ apps/ tests/

      - name: Type check (mypy)
        # Non-blocking: mypy strict mode is aspirational; failures are tracked
        # separately. Remove `continue-on-error` once the type debt is resolved.
        continue-on-error: true
        run: uv run mypy citnega/packages/ citnega/apps/

      - name: Architecture contracts (import-linter)
        # Non-blocking: some transitive imports via ApplicationService are expected.
        # Remove `continue-on-error` once service interface layer is fully abstracted.
        continue-on-error: true
        run: uv run lint-imports --config import-linter.ini

      - name: Run tests with coverage
        run: uv run pytest --cov=citnega --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
