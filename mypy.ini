[mypy]
python_version = 3.11
strict = True
warn_unused_ignores = True
warn_redundant_casts = True
warn_return_any = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
disallow_any_generics = True
no_implicit_reexport = True
show_error_codes = True

# Strict on protocol and shared — zero tolerance
[mypy-citnega.packages.protocol.*]
strict = True

[mypy-citnega.packages.shared.*]
strict = True

# Runtime, adapters/base — strict
[mypy-citnega.packages.runtime.*]
strict = True

[mypy-citnega.packages.adapters.base.*]
strict = True

# Slightly relaxed for app/UI layers
[mypy-citnega.apps.tui.*]
disallow_any_generics = False

# Third-party stubs (no stubs available)
[mypy-aiosqlite.*]
ignore_missing_imports = True

[mypy-alembic.*]
ignore_missing_imports = True

[mypy-sqlalchemy.*]
ignore_missing_imports = True

[mypy-keyring.*]
ignore_missing_imports = True

[mypy-structlog.*]
ignore_missing_imports = True

[mypy-tiktoken.*]
ignore_missing_imports = True

[mypy-textual.*]
ignore_missing_imports = True

[mypy-google.adk.*]
ignore_missing_imports = True

[mypy-langgraph.*]
ignore_missing_imports = True

[mypy-crewai.*]
ignore_missing_imports = True
