[importlinter]
root_package = citnega
contract_types = independence

# ── Layer 0: foundations ───────────────────────────────────────────────────────
[importlinter:contract:protocol-independence]
name       = Protocol layer must not import application code
type       = forbidden
source_modules =
    citnega.packages.protocol
forbidden_modules =
    citnega.packages.runtime
    citnega.packages.adapters
    citnega.packages.agents
    citnega.packages.tools
    citnega.packages.model_gateway
    citnega.packages.storage
    citnega.packages.kb
    citnega.packages.config
    citnega.packages.security
    citnega.packages.observability
    citnega.packages.bootstrap
    citnega.apps

[importlinter:contract:shared-independence]
name       = Shared layer must not import application code
type       = forbidden
source_modules =
    citnega.packages.shared
forbidden_modules =
    citnega.packages.runtime
    citnega.packages.adapters
    citnega.packages.agents
    citnega.packages.tools
    citnega.packages.model_gateway
    citnega.packages.storage
    citnega.packages.kb
    citnega.packages.config
    citnega.packages.security
    citnega.packages.observability
    citnega.packages.bootstrap
    citnega.apps

# ── Framework isolation ────────────────────────────────────────────────────────
[importlinter:contract:no-framework-imports-outside-adapters]
name       = Framework SDKs only in adapter packages
type       = forbidden
source_modules =
    citnega.packages.protocol
    citnega.packages.shared
    citnega.packages.runtime
    citnega.packages.agents
    citnega.packages.tools
    citnega.packages.model_gateway
    citnega.packages.storage
    citnega.packages.kb
    citnega.packages.config
    citnega.packages.security
    citnega.packages.observability
    citnega.apps
forbidden_modules =
    google.adk
    langgraph
    crewai

# ── Presentation layer isolation ──────────────────────────────────────────────
[importlinter:contract:tui-only-uses-service-interface]
name       = TUI must not import runtime internals
type       = forbidden
source_modules =
    citnega.apps.tui
    citnega.apps.cli
forbidden_modules =
    citnega.packages.runtime
    citnega.packages.adapters
    citnega.packages.agents
    citnega.packages.tools
    citnega.packages.model_gateway
    citnega.packages.storage.repositories

# ── Storage layer ─────────────────────────────────────────────────────────────
[importlinter:contract:storage-no-upward-imports]
name       = Storage must not import runtime or adapters
type       = forbidden
source_modules =
    citnega.packages.storage
forbidden_modules =
    citnega.packages.runtime
    citnega.packages.adapters
    citnega.packages.agents
    citnega.packages.tools
    citnega.apps
